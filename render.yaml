# render.yaml — Render Blueprint
# Lets you configure your service from code instead of clicking the dashboard.
# Commit this file to GitHub and Render reads it automatically.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: resumeiq-api
    runtime: python
    region: oregon          # change to: frankfurt, singapore, ohio, virginia
    plan: starter           # free | starter ($7/mo) — use starter for ML models
    buildCommand: ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # Silence tokenizer warning from HuggingFace
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      # Tell sentence-transformers where to cache models (Render's writable dir)
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /tmp/sbert_cache
  
