# render.yaml — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: resumeiq-api
    runtime: python
    region: oregon          # options: oregon, frankfurt, singapore, ohio, virginia

    plan: free

    buildCommand: bash build.sh

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    # Render checks this path after deploy. Must return HTTP 200.
    healthCheckPath: /health

    envVars:
      # Suppress HuggingFace tokenizer fork warning
      - key: TOKENIZERS_PARALLELISM
        value: "false"

      # Cache SBERT model here — /tmp is writable on Render
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /tmp/sbert_cache

      # Limit PyTorch to 1 thread (prevents OOM from thread-stack overhead
      # on single-core free-tier containers)
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
